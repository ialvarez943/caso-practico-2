- name: Check if kubeconfig file exists
  ansible.builtin.stat:
    path: "{{ kubeconfig_path }}"
  register: kubeconfig_file

- name: Fallar si no existe el kubeconfig
  ansible.builtin.fail:
    msg: "No existe {{ kubeconfig_path }}. Exporta la salida kube_config de Terraform a ese fichero antes de ejecutar este rol."
  when: not kubeconfig_file.stat.exists

- name: Create namespace
  vars:
    ansible_python_interpreter: "/usr/bin/python3"
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      kind: Namespace
      apiVersion: v1
      metadata:
        name: "{{ app_namespace }}"

- name: Create secret docker-registry for ACR
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      kind: Secret
      apiVersion: v1
      metadata:
        name: acr-auth
        namespace: "{{ app_namespace }}"
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ {'auths': {acr_login_server: {'username': acr_username, 'password': acr_password, 'auth': (acr_username + ':' + acr_password) | b64encode}}} | to_json | b64encode }}"

- name: Create Redis PersistentVolumeClaim
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      kind: PersistentVolumeClaim
      apiVersion: v1
      metadata:
        name: "redis-data"
        namespace: "{{ app_namespace }}"
      spec:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi

- name: Deploy App
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition: "{{ lookup('template', 'app_template.yml.j2') }}"
    namespace: "{{ app_namespace }}"